<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard - Loan Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="user-dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>Welcome, <span id="userName"></span>!</h1>

    <!-- Profile Summary -->
    <div class="card">
      <h3>Your Profile</h3>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Phone:</strong> <span id="userPhone">Not provided</span></p>
      <p><strong>Address:</strong> <span id="userAddress">Not provided</span></p>
    </div>

    <!-- Financial Summary -->
    <div class="card">
      <h3>Financial Summary</h3>
      <div class="summary-grid">
        <div class="summary-item">
          <span>Amount Owing</span>
          <span class="amount" id="amountOwing">K0.00</span>
        </div>
        <div class="summary-item">
          <span>Paid Balance</span>
          <span class="amount" id="paidBalance">K0.00</span>
        </div>
      </div>
    </div>

    <!-- Loan Application -->
    <div class="card">
      <h3>Apply for a Loan</h3>
      <form id="loanForm" enctype="multipart/form-data">
        <div class="form-group">
          <label>Loan Amount (K)</label>
          <input type="number" id="loanAmount" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Purpose</label>
          <textarea id="loanPurpose" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label>Attach Document (e.g., ID)</label>
          <input type="file" id="loanFile" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>
        <button type="submit" id="submitLoan">Submit Application</button>
        <p id="loanError" class="error"></p>
      </form>
    </div>

    <!-- Loan History -->
    <div class="card">
      <h3>Your Loans</h3>
      <table id="loansTable">
        <thead>
          <tr>
            <th>Amount</th>
            <th>Purpose</th>
            <th>Status</th>
            <th>Attachment</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="loansBody">
          <!-- populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // Ensure user is logged in and fetch data
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const userId = session.user.id;

      // Fetch profile
      const { data: profile } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', userId)
        .single();
      
      document.getElementById('userName').textContent = profile?.full_name || 'User';
      document.getElementById('userEmail').textContent = session.user.email;
      if (profile?.phone) document.getElementById('userPhone').textContent = profile.phone;
      if (profile?.address) document.getElementById('userAddress').textContent = profile.address;

      // Fetch loans and calculate totals
      const { data: loans } = await supabase
        .from('loans')
        .select('*')
        .eq('user_id', userId)
        .order('created_at', { ascending: false });

      let amountOwing = 0;
      let paidBalance = 0;

      // For each loan, fetch payments
      for (const loan of loans || []) {
        const { data: payments } = await supabase
          .from('payments')
          .select('amount')
          .eq('loan_id', loan.id);
        
        const totalPaid = payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
        amountOwing += loan.amount;
        paidBalance += totalPaid;
      }

      document.getElementById('amountOwing').textContent = `$${amountOwing.toFixed(2)}`;
      document.getElementById('paidBalance').textContent = `$${paidBalance.toFixed(2)}`;

      // Populate loans table
      const tbody = document.getElementById('loansBody');
      tbody.innerHTML = '';
      if (loans && loans.length > 0) {
        loans.forEach(loan => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>$${loan.amount.toFixed(2)}</td>
            <td>${loan.purpose || ''}</td>
            <td><span class="status ${loan.status}">${loan.status}</span></td>
            <td>${loan.file_url ? `<a href="${loan.file_url}" target="_blank">View</a>` : 'No file'}</td>
            <td>${new Date(loan.created_at).toLocaleDateString()}</td>
          `;
          tbody.appendChild(row);
        });
      } else {
        tbody.innerHTML = '<tr><td colspan="5">No loans found.</td></tr>';
      }
    })();

    // Handle loan application
    document.getElementById('loanForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitLoan');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const amount = parseFloat(document.getElementById('loanAmount').value);
      const purpose = document.getElementById('loanPurpose').value;
      const file = document.getElementById('loanFile').files[0];

      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) throw new Error('Not authenticated');

        // Upload file
        const fileExt = file.name.split('.').pop();
        const fileName = `${session.user.id}-${Date.now()}.${fileExt}`;
        const { error: uploadError } = await supabase.storage
          .from('loan-attachments')
          .upload(fileName, file);
        if (uploadError) throw uploadError;

        // Get public URL
        const { data: urlData } = supabase.storage
          .from('loan-attachments')
          .getPublicUrl(fileName);
        const fileUrl = urlData.publicUrl;

        // Insert loan record
        const { error: loanError } = await supabase
          .from('loans')
          .insert({
            user_id: session.user.id,
            amount,
            purpose,
            file_url: fileUrl,
            status: 'pending'
          });
        if (loanError) throw loanError;

        alert('Loan application submitted!');
        location.reload(); // simple refresh to show new loan
      } catch (err) {
        document.getElementById('loanError').textContent = err.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Application';
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
