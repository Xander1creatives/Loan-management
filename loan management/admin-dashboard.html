<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Loan Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="admin-dashboard.html">Admin Panel</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>Admin Dashboard</h1>

    <!-- Assign Loan Form -->
    <div class="card">
      <h3>Assign Loan to User</h3>
      <form id="assignLoanForm">
        <div class="form-group">
          <label>Select User</label>
          <select id="userSelect" required>
            <option value="">-- Choose a user --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Loan Amount ($)</label>
          <input type="number" id="loanAmount" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label>Purpose (optional)</label>
          <input type="text" id="loanPurpose">
        </div>
        <button type="submit">Assign Loan</button>
        <p id="assignError" class="error"></p>
      </form>
    </div>

    <!-- Users List -->
    <div class="card">
      <h3>All Users</h3>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <!-- populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    (async () => {
      // Check if user is admin
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const { data: profile } = await supabase
        .from('profiles')
        .select('role')
        .eq('id', session.user.id)
        .single();

      if (profile?.role !== 'admin') {
        window.location.href = 'user-dashboard.html';
        return;
      }

      // Fetch all users
      const { data: users } = await supabase
        .from('profiles')
        .select('*')
        .order('created_at', { ascending: false });

      const userSelect = document.getElementById('userSelect');
      const usersBody = document.getElementById('usersBody');

      users.forEach(user => {
        // Populate select
        const option = document.createElement('option');
        option.value = user.id;
        option.textContent = `${user.full_name} (${user.email})`;
        userSelect.appendChild(option);

        // Populate table
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.full_name || ''}</td>
          <td>${user.email}</td>
          <td>${user.role}</td>
          <td>${new Date(user.created_at).toLocaleDateString()}</td>
        `;
        usersBody.appendChild(row);
      });

      // Handle assign loan
      document.getElementById('assignLoanForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userId = document.getElementById('userSelect').value;
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const purpose = document.getElementById('loanPurpose').value;

        try {
          const { error } = await supabase
            .from('loans')
            .insert({
              user_id: userId,
              amount,
              purpose: purpose || 'Admin assigned',
              status: 'approved' // or 'pending' as you like
            });
          if (error) throw error;
          alert('Loan assigned successfully!');
          document.getElementById('assignLoanForm').reset();
        } catch (err) {
          document.getElementById('assignError').textContent = err.message;
        }
      });
    })();

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
